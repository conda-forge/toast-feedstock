
{% set version = "3.0.2" %}

package:
  name: toast
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/toast/toast-{{ version }}.tar.gz
  sha256: f90cde38d4369d19dad13ab3a6388a96ab0c199e6fcb52196304e4910353bf0e

build:
  skip: True  # [py<310 or win]
  number: 0

requirements:
  build:
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - numpy                               # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
    - ninja
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
  host:
    - python
    - pip
    - scikit-build-core >=0.11
    - pybind11 >=3.0
    - setuptools >=80
    - setuptools-scm >=8
    - numpy
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - libopenblas * *openmp*
    - libblas * *openblas
    - fftw
    - liblapack
    - suitesparse
    - libaatm
  run:
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - libopenblas * *openmp*
    - libblas * *openblas
    - python
    - numpy
    - scipy
    - astropy-base
    - healpy
    - h5py
    - ephem
    - tomlkit
    - traitlets
    - matplotlib
    - psutil
    - ruamel.yaml
    - wurlitzer
    - pshmem >=1.3.3
    - flacarray >=0.4.0

test:
  requires:
    - mpi4py
  commands:
    - OMP_NUM_THREADS=2 python -c 'import toast.tests; toast.tests.run()'  # [build_platform == target_platform]
    - OMP_NUM_THREADS=1 mpirun -np 2 python -c 'import toast.tests; toast.tests.run()'  # [build_platform == target_platform]

about:
  home: https://github.com/hpc4cmb/toast
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Time Ordered Astrophysics Scalable Tools'
  description: |
    TOAST is a software framework for simulating and processing timestream data
    collected by microwave telescopes.
  doc_url: https://hpc4cmb.github.io/toast
  dev_url: https://github.com/hpc4cmb/toast

extra:
  recipe-maintainers:
    - tskisner
